name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: gofmt -l . | tee /dev/stderr | (! read)

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
